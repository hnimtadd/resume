<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Resume of Nguyen Dinh Minh Dat - Software Engineer">
    <title>Nguyen Dinh Minh Dat - Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #718096;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .social-link:hover {
            color: #764ba2;
        }

        .icon {
            margin-right: 5px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .container {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nguyen Dinh Minh Dat</h1>
        <p class="subtitle">Software Engineer</p>

        <a href="resume.pdf" class="btn" download>
            My Resume (PDF)
        </a>

        <div class="links">
            <a href="https://github.com/hnimtadd" class="social-link" target="_blank">GitHub</a>
            <a href="https://linkedin.com/in/hnimtadd" class="social-link" target="_blank">LinkedIn</a>
            <a href="mailto:minhdat15012002@gmail.com" class="social-link">Email</a>
            <a href="https://www.info.craftznake.space" class="social-link" target="_blank">Personal space</a>
        </div>
    </div>
</body>
</html>
